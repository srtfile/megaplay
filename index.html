<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GogoAnime Stream Extractor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', monospace;
      background: #0d0d0d;
      color: #ddd;
      padding: 28px 24px;
      min-height: 100vh;
    }

    h2 {
      font-size: 1.25rem;
      color: #fff;
      letter-spacing: 0.04em;
      margin-bottom: 20px;
      border-bottom: 1px solid #2a2a2a;
      padding-bottom: 12px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 18px;
    }

    input {
      background: #1a1a1a;
      color: #eee;
      border: 1px solid #333;
      padding: 8px 12px;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #e74c3c; }
    input#show { width: 140px; }
    input#ep   { width: 140px; }

    .toggle-group {
      display: flex;
      border: 1px solid #333;
      border-radius: 4px;
      overflow: hidden;
    }
    .toggle-group label {
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.85rem;
      color: #aaa;
      background: #1a1a1a;
      user-select: none;
      transition: background 0.15s, color 0.15s;
    }
    .toggle-group input[type="checkbox"] { display: none; }
    .toggle-group input[type="checkbox"]:checked + label {
      background: #e74c3c;
      color: #fff;
    }
    .toggle-group label:not(:last-child) { border-right: 1px solid #333; }

    button#extractBtn {
      background: #e74c3c;
      color: #fff;
      border: none;
      padding: 9px 22px;
      border-radius: 4px;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: bold;
      letter-spacing: 0.03em;
      transition: background 0.15s;
    }
    button#extractBtn:hover { background: #c0392b; }
    button#extractBtn:disabled { background: #555; cursor: not-allowed; }

    #out {
      background: #111;
      border: 1px solid #222;
      border-radius: 6px;
      padding: 16px;
      font-size: 0.82rem;
      line-height: 1.7;
      min-height: 80px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .url   { color: #2ecc71; font-weight: bold; }
    .label { color: #f39c12; }
    .err   { color: #e74c3c; }
    .info  { color: #888; }
    .sub   { color: #3498db; }
    .dub   { color: #9b59b6; }
    .head  { color: #f1c40f; font-weight: bold; }

    .copy-btn {
      display: inline-block;
      margin-left: 8px;
      padding: 1px 8px;
      font-size: 0.72rem;
      background: #222;
      border: 1px solid #444;
      border-radius: 3px;
      color: #aaa;
      cursor: pointer;
      vertical-align: middle;
      font-family: inherit;
      transition: background 0.1s;
    }
    .copy-btn:hover { background: #333; color: #fff; }
  </style>
</head>
<body>
  <h2>🎬 GogoAnime Stream Extractor</h2>

  <div class="controls">
    <input id="show" placeholder="Show ID (e.g. 2)" value="2" />
    <input id="ep"   placeholder="Episode (e.g. 235)" value="235" />

    <div class="toggle-group">
      <input type="checkbox" id="chkSub" checked />
      <label for="chkSub">SUB</label>
      <input type="checkbox" id="chkDub" checked />
      <label for="chkDub">DUB</label>
    </div>

    <button id="extractBtn" onclick="extract()">Extract</button>
  </div>

  <div id="out">Ready. Enter Show ID and Episode, choose SUB / DUB, then click Extract.</div>

<script>
// ─── PROXY LIST ───────────────────────────────────────────────────────────────
const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];

// ─── OUTPUT HELPERS ───────────────────────────────────────────────────────────
const outEl = document.getElementById("out");

function clearOut() { outEl.innerHTML = ""; }

function appendLine(text = "", cls = "") {
  const span = document.createElement("span");
  if (cls) span.className = cls;
  span.textContent = text + "\n";
  outEl.appendChild(span);
}

function appendURL(url) {
  const wrapper = document.createElement("span");

  const link = document.createElement("span");
  link.className = "url";
  link.textContent = url;

  const btn = document.createElement("button");
  btn.className = "copy-btn";
  btn.textContent = "copy";
  btn.onclick = () => {
    navigator.clipboard.writeText(url).then(() => {
      btn.textContent = "✓";
      setTimeout(() => btn.textContent = "copy", 1500);
    });
  };

  wrapper.appendChild(link);
  wrapper.appendChild(btn);
  wrapper.appendChild(document.createTextNode("\n"));
  outEl.appendChild(wrapper);
}

// ─── NETWORK ─────────────────────────────────────────────────────────────────
async function fetchWithFallback(url, headers = {}) {
  for (let i = 0; i < PROXIES.length; i++) {
    const proxyUrl = PROXIES[i](url);
    try {
      appendLine(`    [proxy ${i + 1}] trying…`, "info");
      const r = await fetch(proxyUrl, {
        headers,
        signal: AbortSignal.timeout(14000),
      });
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      appendLine(`    [proxy ${i + 1}] ✅ OK`, "info");
      return r;
    } catch (e) {
      appendLine(`    [proxy ${i + 1}] ❌ ${e.message}`, "err");
      if (i === PROXIES.length - 1) throw new Error("All proxies failed");
    }
  }
}

// ─── CORE: fetch one variant (sub or dub) ────────────────────────────────────
//
// URL pattern discovered from: https://megaplay.buzz/stream/s-{showId}/{ep}/{type}
//   Step 1 – Fetch the megaplay page for the given type (sub|dub)
//   Step 2 – Parse file ID from the page HTML
//   Step 3 – Call getSources API with required headers
//   Step 4 – Extract all m3u8 URLs from the JSON response
//
async function extractVariant(showId, ep, type /* "sub" | "dub" */) {
  const typeLabel = type.toUpperCase();
  const typeClass = type === "sub" ? "sub" : "dub";

  appendLine(`\n── ${typeLabel} ──────────────────────────────────────────────`, "head");

  // ── Step 1: Build megaplay URL & fetch page ──────────────────────────────
  // Pattern: https://megaplay.buzz/stream/s-{showId}/{ep}/{type}
  const streamPage = `https://megaplay.buzz/stream/s-${showId}/${ep}/${type}`;
  appendLine(`[1] Fetching ${typeLabel} page…`, "label");
  appendLine(`    → ${streamPage}`, typeClass);

  let streamHtml;
  try {
    const r = await fetchWithFallback(streamPage, {
      "Referer": "https://gogoanime.me.uk/",
    });
    streamHtml = await r.text();
  } catch (e) {
    appendLine(`❌ Failed to load ${typeLabel} page: ${e.message}`, "err");
    return [];
  }

  // ── Step 2: Extract file ID ──────────────────────────────────────────────
  // Try multiple patterns the page may use
  const fileId =
    streamHtml.match(/getSources\?id=(\d+)/)?.[1] ||
    streamHtml.match(/['"]\s*id\s*['"]\s*:\s*['"]\s*(\d+)\s*['"]/)?.[1] ||
    streamHtml.match(/File\s+(\d+)/i)?.[1] ||
    streamHtml.match(/file[_-]?id['":\s]+(\d+)/i)?.[1];

  if (!fileId) {
    appendLine(`❌ File ID not found for ${typeLabel}. The page may have changed.`, "err");

    // Dump first 600 chars of HTML as a debug hint
    appendLine(`   [debug] first 600 chars of page:`, "info");
    appendLine(`   ${streamHtml.slice(0, 600)}`, "info");
    return [];
  }
  appendLine(`    → file ID: ${fileId}\n`, typeClass);

  // ── Step 3: Call getSources API ──────────────────────────────────────────
  const base   = new URL(streamPage).origin;              // https://megaplay.buzz
  const apiUrl = `${base}/stream/getSources?id=${fileId}`;
  appendLine(`[2] Calling getSources API…`, "label");
  appendLine(`    → ${apiUrl}`, typeClass);

  let data;
  try {
    const apiRes = await fetchWithFallback(apiUrl, {
      "X-Requested-With": "XMLHttpRequest",
      "Referer":          streamPage,
      "Origin":           base,
    });
    data = await apiRes.json();
  } catch (e) {
    appendLine(`❌ getSources failed for ${typeLabel}: ${e.message}`, "err");
    return [];
  }

  // ── Step 4: Collect m3u8 URLs ────────────────────────────────────────────
  const m3u8s = [];
  const src = data.sources;

  if (Array.isArray(src)) {
    src.forEach(s => {
      if (s.file?.includes(".m3u8")) m3u8s.push(s.file);
    });
  } else if (src?.file?.includes(".m3u8")) {
    m3u8s.push(src.file);
  }
  if (data.file?.includes(".m3u8")) m3u8s.push(data.file);

  // Also grab backup/mirror sources if present
  const backup = data.sources_bk || data.sourcesBackup || [];
  if (Array.isArray(backup)) {
    backup.forEach(s => {
      if (s.file?.includes(".m3u8")) m3u8s.push(s.file);
    });
  }

  const unique = [...new Set(m3u8s)];
  return { type: typeLabel, urls: unique, raw: data };
}

// ─── MAIN ENTRY ──────────────────────────────────────────────────────────────
async function extract() {
  clearOut();

  const showId  = document.getElementById("show").value.trim();
  const ep      = document.getElementById("ep").value.trim();
  const wantSub = document.getElementById("chkSub").checked;
  const wantDub = document.getElementById("chkDub").checked;

  if (!showId || !ep) {
    appendLine("Please enter Show ID and Episode.", "err");
    return;
  }
  if (!wantSub && !wantDub) {
    appendLine("Select at least one of SUB or DUB.", "err");
    return;
  }

  document.getElementById("extractBtn").disabled = true;
  appendLine(`🔍 Show ID: ${showId}  |  Episode: ${ep}`, "label");

  const variants = [];
  if (wantSub) variants.push("sub");
  if (wantDub) variants.push("dub");

  const results = [];
  for (const v of variants) {
    const res = await extractVariant(showId, ep, v);
    results.push(res);
  }

  // ── Summary ────────────────────────────────────────────────────────────────
  appendLine(`\n${"═".repeat(62)}`, "head");
  appendLine("  RESULTS", "head");
  appendLine(`${"═".repeat(62)}`, "head");

  let total = 0;
  for (const res of results) {
    if (!res) continue;
    const cls = res.type === "SUB" ? "sub" : "dub";

    if (res.urls.length === 0) {
      appendLine(`\n[${res.type}]  ⚠️  No m3u8 URLs found. Raw JSON:`, "err");
      appendLine(JSON.stringify(res.raw, null, 2), "info");
    } else {
      appendLine(`\n[${res.type}]  ✅  ${res.urls.length} stream URL(s):`, cls);
      res.urls.forEach(u => appendURL(u));
      total += res.urls.length;
    }
  }

  if (total > 0) {
    appendLine(`\n✅ Total: ${total} URL(s) extracted.`, "label");
  } else {
    appendLine(`\n⚠️  No URLs found.`, "err");
    appendLine(`💡 Tip: The getSources API may require a direct (non-proxied) connection.`, "label");
    appendLine(`   Run a local Python script with requests if proxies keep failing.`, "info");
  }

  appendLine(`${"═".repeat(62)}\n`, "head");
  document.getElementById("extractBtn").disabled = false;
}
</script>
</body>
</html>
